<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" role="img" aria-label="designer-skill MCP banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="55%" stop-color="#151922"/>
      <stop offset="100%" stop-color="#1a1420"/>
    </linearGradient>
    <radialGradient id="glow-coral" cx="22%" cy="78%" r="48%">
      <stop offset="0%" stop-color="#e87a3d" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#e87a3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="82%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="48%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e87a3d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="360" fill="url(#bg)"/>
  <rect width="1440" height="360" fill="url(#grid)"/>
  <rect width="1440" height="360" fill="url(#glow-coral)"/>
  <rect width="1440" height="360" fill="url(#glow-blue)"/>

  <rect x="72" y="72" width="1296" height="216" rx="20" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="720" y="132" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace" font-size="18" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="0.28em">PLUG-AND-PLAY MCP</text>

  <text x="720" y="196" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace" font-size="72" font-weight="700" fill="url(#title)" text-anchor="middle">designer-skill</text>

  <rect x="612" y="214" width="216" height="4" rx="2" fill="url(#accent)"/>

  <text x="720" y="252" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace" font-size="28" font-weight="600" fill="#3b82f6" text-anchor="middle">UI superpowers for your agent</text>

  <g font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace" font-size="13" font-weight="600">
    <rect x="430" y="286" width="118" height="30" rx="15" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-opacity="0.45"/>
    <text x="489" y="306" fill="#34d399" text-anchor="middle">10 tools</text>

    <rect x="562" y="286" width="118" height="30" rx="15" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.45"/>
    <text x="621" y="306" fill="#c4b5fd" text-anchor="middle">13 refs</text>

    <rect x="694" y="286" width="138" height="30" rx="15" fill="#e87a3d" fill-opacity="0.18" stroke="#e87a3d" stroke-opacity="0.45"/>
    <text x="763" y="306" fill="#fdba74" text-anchor="middle">44 rules</text>

    <rect x="846" y="286" width="164" height="30" rx="15" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-opacity="0.45"/>
    <text x="928" y="306" fill="#93c5fd" text-anchor="middle">zero config</text>
  </g>
</svg>
